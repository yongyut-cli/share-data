name: EOD pipeline (Thai Stock Analyzer)

# รันอัตโนมัติ 2 จังหวะในวันทำการ (จันทร์–ศุกร์):
#   1) ทุก 15 นาที ระหว่างตลาด SET เปิด (10:00–16:30 ICT = 03:00–09:30 UTC)
#      → โหมด --intraday: ดึงเฉพาะราคา/เทคนิค ไม่ดึงงบ/ข่าว ไม่ยิง Telegram (เบา+ไม่รบกวน)
#   2) 17:30 ICT (= 10:30 UTC) หลังตลาดปิด
#      → โหมด --all เต็ม: ราคา + งบ + ข่าว + sentiment + เทียบสัญญาณ + แจ้งเตือน Telegram
# และสั่งรันเองได้จากแท็บ Actions (workflow_dispatch)
on:
  schedule:
    - cron: '*/15 3-9 * * 1-5'   # intraday (ระหว่างตลาดเปิด)
    - cron: '30 10 * * 1-5'      # EOD เต็ม (หลังปิด)
  workflow_dispatch:
    inputs:
      mode:
        description: 'ขอบเขตการดึง'
        type: choice
        default: all
        options: [all, demo]

permissions:
  contents: write   # ให้ job commit ผลลัพธ์ JSON กลับเข้า repo ได้

concurrency:
  group: eod-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ไม่มี dependency ภายนอก (ใช้ fetch ในตัวของ Node 20) — ข้าม npm install
      # Phase 2: sentiment ข่าวด้วย LLM — ตั้ง Secret อย่างใดอย่างหนึ่ง
      #          · GEMINI_API_KEY    → ใช้ Google AI Studio (Gemini, มี free tier) [มาก่อน]
      #          · ANTHROPIC_API_KEY → ใช้ Claude (ถ้าไม่ได้ตั้ง Gemini)
      #          ถ้าไม่ตั้งเลย → ข้าม sentiment เงียบ ๆ (เทคนิค+พื้นฐานยังทำงานครบ)
      # Phase 3: ถ้าตั้ง Secret TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID จะส่งแจ้งเตือน
      #          สรุปรายวัน + สัญญาณเปลี่ยน · ถ้าไม่ตั้ง → ข้ามเงียบ ๆ
      - name: Run EOD pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ github.event.schedule }}" = "*/15 3-9 * * 1-5" ]; then
            echo "▶ Intraday update — ราคา/เทคนิคเท่านั้น (ไม่ดึงงบ/ข่าว, ไม่ยิง Telegram)"
            node pipeline/run.js --intraday
          else
            MODE="${{ github.event.inputs.mode || 'all' }}"
            echo "▶ EOD full update — node pipeline/run.js --$MODE"
            node pipeline/run.js --"$MODE"
          fi

      # Phase 3: backtest คุณภาพสัญญาณ → data/backtest.json (ไม่ใช้ network, ~3 วิ)
      # ข้ามในรอบ intraday (สัญญาณ backtest อิง EOD — ไม่จำเป็นต้องคำนวณทุก 15 นาที)
      - name: Backtest signal quality
        if: ${{ github.event.schedule != '*/15 3-9 * * 1-5' }}
        run: node pipeline/backtest.js
        continue-on-error: true

      # commit ผลลัพธ์กลับเข้า repo (share-data) เพื่อแชร์/เก็บประวัติ
      - name: Commit data
        run: |
          git config user.name  "eod-bot"
          git config user.email "eod-bot@users.noreply.github.com"
          git add public_html/stock/data
          if git diff --cached --quiet; then
            echo "ไม่มีข้อมูลเปลี่ยนแปลง — ข้าม commit"
          else
            if [ "${{ github.event.schedule }}" = "*/15 3-9 * * 1-5" ]; then
              LABEL="intraday $(date -u +%Y-%m-%d\ %H:%MZ)"
            else
              LABEL="EOD $(date -u +%Y-%m-%d)"
            fi
            git commit -m "data: $LABEL update"
            git push
          fi

      # (ทางเลือก) deploy ไฟล์เว็บ+ข้อมูลขึ้น Hostinger ผ่าน FTP
      # จะทำงานก็ต่อเมื่อมีการตั้งค่า Secrets: FTP_HOST / FTP_USER / FTP_PASS
      - name: Deploy to Hostinger (FTP)
        if: ${{ env.FTP_HOST != '' }}
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "set ftp:ssl-allow no; \
            open -u \"$FTP_USER\",\"$FTP_PASS\" \"$FTP_HOST\"; \
            mirror -R --only-newer public_html/stock /domains/yongyut.it-tni.online/public_html/stock"
