<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<script src="assets/vendor/tailwind.js"></script>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="max-w-7xl mx-auto px-4 sm:px-6 py-5">
  <header class="flex items-center justify-between mb-6 flex-wrap gap-3">
    <div class="flex items-center gap-3">
      <a href="index.html" class="w-10 h-10 rounded-xl grid place-items-center" style="background:linear-gradient(135deg,#10d18e,#3b82f6)"><span class="text-xl">📊</span></a>
      <div><div class="font-bold text-lg">Thai Stock <span style="color:var(--accent)">Analyzer</span></div>
      <div class="disclaimer">วิเคราะห์หุ้นไทย · EOD · ใช้ส่วนตัว</div></div>
    </div>
    <nav class="flex items-center gap-1">
      <a class="navlink" href="index.html">แดชบอร์ด</a>
      <a class="navlink active" href="screener.html">คัดกรองหุ้น</a>
      <a class="navlink" href="detail.html?sym=PTT">รายตัว</a>
      <a class="navlink" href="portfolio.html">พอร์ต</a>
      <a class="navlink" href="account.php" title="เปลี่ยนรหัสผ่าน">เปลี่ยนรหัส</a>
      <a class="navlink" href="logout.php" title="ออกจากระบบ">ออกจากระบบ</a>
    </nav>
  </header>

  <div class="card p-4 mb-4 fade-in">
    <div class="search-wrap mb-3">
      <input id="fSearch" type="text" class="search" placeholder="ค้นหาด้วยชื่อย่อ / ชื่อบริษัท (เช่น PTT, ปตท., bank)" autocomplete="off">
    </div>
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-3 items-end">
      <label class="text-sm">เซกเตอร์
        <select id="fSector" class="w-full mt-1 bg-white/5 rounded-lg p-2 border border-white/10"></select></label>
      <label class="text-sm">สัญญาณ
        <select id="fSignal" class="w-full mt-1 bg-white/5 rounded-lg p-2 border border-white/10">
          <option value="">ทั้งหมด</option><option>BUY</option><option>ACCUMULATE</option>
          <option>HOLD</option><option>REDUCE</option><option>SELL</option><option>AVOID</option></select></label>
      <label class="text-sm">คะแนนรวมขั้นต่ำ: <span id="vScore">0</span>
        <input id="fScore" type="range" min="0" max="100" value="0" class="w-full mt-2"></label>
      <label class="text-sm">พื้นฐานขั้นต่ำ: <span id="vFund">0</span>
        <input id="fFund" type="range" min="0" max="100" value="0" class="w-full mt-2"></label>
      <label class="text-sm">ปันผลขั้นต่ำ (%): <span id="vDiv">0</span>
        <input id="fDiv" type="range" min="0" max="10" step="0.5" value="0" class="w-full mt-2"></label>
      <label class="text-sm">โมเมนตัมขั้นต่ำ: <span id="vMom">0</span>
        <input id="fMom" type="range" min="0" max="100" value="0" class="w-full mt-2"></label>
      <label class="text-sm flex items-center gap-2 mt-5">
        <input id="fLT" type="checkbox" class="w-4 h-4"> เฉพาะ "เหมาะถือยาว" 🌱</label>
    </div>
  </div>

  <div class="card p-4 fade-in">
    <div class="flex justify-between mb-2 items-center flex-wrap gap-2">
      <h2 class="font-bold">ผลการคัดกรอง — <span id="cnt">0</span> ตัว</h2>
      <span class="pageinfo" id="pginfo"></span>
    </div>
    <div class="overflow-x-auto">
      <table><thead><tr>
        <th>หุ้น</th><th>เซกเตอร์</th><th>ราคา</th><th>เปลี่ยน</th><th>คะแนนรวม</th>
        <th>เทคนิค</th><th>พื้นฐาน</th><th>ปันผล</th><th>ถือยาว</th><th>สัญญาณ</th>
      </tr></thead><tbody id="tb"></tbody></table>
    </div>
    <div class="pager" id="pager"></div>
  </div>
  <p class="disclaimer text-center mt-6">
    ข้อมูลราคา EOD + งบการเงินจริง · เทคนิค + พื้นฐาน (Phase 2) · ⚠️ ไม่ใช่คำแนะนำการลงทุน
  </p>
</div>

<script src="assets/app.js"></script>
<script>
READY.then(() => {
  const fSector=document.getElementById('fSector');
  fSector.innerHTML='<option value="">ทุกเซกเตอร์</option>'+SECTORS.map(s=>`<option>${s}</option>`).join('');
  const els=['fSector','fSignal','fScore','fFund','fDiv','fMom','fLT'].map(i=>document.getElementById(i));
  document.getElementById('fScore').oninput=e=>document.getElementById('vScore').textContent=e.target.value;
  document.getElementById('fFund').oninput=e=>document.getElementById('vFund').textContent=e.target.value;
  document.getElementById('fDiv').oninput=e=>document.getElementById('vDiv').textContent=e.target.value;
  document.getElementById('fMom').oninput=e=>document.getElementById('vMom').textContent=e.target.value;

  // คัด+เรียง ตามฟิลเตอร์ (ช่องค้นหาจัดการแยกใน attachPagedTable)
  function filtered(){
    const sec=fSector.value, sig=document.getElementById('fSignal').value;
    const sc=+document.getElementById('fScore').value, mm=+document.getElementById('fMom').value;
    const fn=+document.getElementById('fFund').value, dv=+document.getElementById('fDiv').value;
    const lt=document.getElementById('fLT').checked;
    return STOCKS.filter(s=>(!sec||s.sector===sec)&&(!sig||s.signal===sig)
        &&(s.comp??0)>=sc&&(s.mom??0)>=mm&&(s.fund??0)>=fn&&(s.div??0)>=dv&&(!lt||s.longTerm))
      .sort((a,b)=>(b.comp??0)-(a.comp??0));
  }
  const renderRows=rows=>rows.map(s=>{
    const m=SIGNAL_META[s.signal];
    const chg=(s.chg>=0?'+':'')+fmtNum(s.chg)+'%';
    return `<tr onclick="location.href='detail.html?sym=${s.sym}'">
      <td><b>${s.sym}</b> <span class="disclaimer">${s.name}</span></td>
      <td class="muted">${s.sector}</td><td>${fmtNum(s.price)}</td>
      <td class="${s.chg>=0?'up':'down'}">${chg}</td>
      <td><div class="flex items-center gap-2"><b>${s.comp ?? '—'}</b>
        <div class="scorebar w-14"><i style="width:${s.comp??0}%;background:${scoreColor(s.comp)}"></i></div></div></td>
      <td style="color:${scoreColor(s.tech)}">${s.tech ?? '—'}</td>
      <td style="color:${scoreColor(s.fund)}">${s.fund ?? '—'}${s.grade?` <span class="disclaimer">${s.grade}</span>`:''}</td>
      <td>${s.div!=null?fmtNum(s.div,1)+'%':'—'}</td>
      <td class="text-center">${s.longTerm?'🌱':''}</td>
      <td><span class="chip ${m.cls}">${m.label}</span></td></tr>`;
  }).join('');

  const search=document.getElementById('fSearch');
  const table=attachPagedTable({
    source:()=>{ const r=searchStocks(filtered(),search.value); document.getElementById('cnt').textContent=r.length; return r; },
    render:renderRows, body:document.getElementById('tb'),
    pager:document.getElementById('pager'), info:document.getElementById('pginfo'),
    perPage:25, cols:10,
  });
  // ฟิลเตอร์ทุกตัว (รวมช่องค้นหา) → รีเฟรชกลับหน้า 1
  els.forEach(e=>e.addEventListener('input',table.refresh));
  search.addEventListener('input',table.refresh);
  table.refresh();
}).catch(showDataError);
</script>
</body>
</html>
